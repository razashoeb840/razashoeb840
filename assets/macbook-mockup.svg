
<svg width="900" height="560" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2a35"/>
      <stop offset="100%" stop-color="#111117"/>
    </linearGradient>
    <clipPath id="screenClip">
      <rect x="60" y="40" width="780" height="440" rx="10"/>
    </clipPath>
  </defs>

  <!-- outer laptop shell -->
  <rect x="20" y="10" width="860" height="480" rx="22" fill="url(#body)" stroke="#3d3d4d" stroke-width="2"/>
  <!-- screen bezel -->
  <rect x="60" y="40" width="780" height="440" rx="10" fill="#0d1117"/>

  <!--
    REPLACE the href below with your actual project screenshot URL
    (e.g. a raw.githubusercontent.com link or an image hosted in /assets)
  -->
  <image href="../Screenshot 2026-07-19 140937.png"
         x="60" y="40" width="780" height="440" clip-path="url(#screenClip)" preserveAspectRatio="xMidYMid slice"/>

  <!-- webcam dot -->
  <circle cx="450" cy="25" r="3" fill="#3d3d4d"/>

  <!-- base / hinge -->
  <path d="M0 490 L900 490 L860 520 Q450 545 40 520 Z" fill="#1c1c24" stroke="#3d3d4d" stroke-width="1.5"/>
  <rect x="400" y="490" width="100" height="8" rx="3" fill="#0a0a0f"/>
</svg>

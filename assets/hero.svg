
<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="45%" stop-color="#1b1436"/>
      <stop offset="100%" stop-color="#0f0c29"/>
    </linearGradient>
    <linearGradient id="neonText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F5FF"/>
      <stop offset="50%" stop-color="#8A2BE2"/>
      <stop offset="100%" stop-color="#00F5FF"/>
      <animate attributeName="x1" values="-20%;100%;-20%" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="80%;200%;80%" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#8A2BE2" stroke-opacity="0.10" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="url(#bgGrad)"/>
  <rect width="1200" height="320" fill="url(#grid)">
    <animateTransform attributeName="transform" type="translate" values="0 0;42 42;0 0" dur="8s" repeatCount="indefinite"/>
  </rect>

  <rect x="-260" y="0" width="260" height="320" fill="url(#neonText)" opacity="0.05">
    <animate attributeName="x" values="-260;1200" dur="4.5s" repeatCount="indefinite"/>
  </rect>

  <circle cx="90" cy="55" r="3.5" fill="#00F5FF">
    <animate attributeName="r" values="3.5;7;3.5" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.25;1" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1115" cy="270" r="3.5" fill="#8A2BE2">
    <animate attributeName="r" values="3.5;7;3.5" dur="2.7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.25;1" dur="2.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1080" cy="50" r="2.5" fill="#00F5FF">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3.1s" repeatCount="indefinite"/>
  </circle>

  <line x1="60" y1="235" x2="1140" y2="235" stroke="url(#neonText)" stroke-width="1" opacity="0.35"/>

  <text x="600" y="150" text-anchor="middle" font-family="'Cascadia Code','Fira Code',monospace" font-size="72" font-weight="800" letter-spacing="4" fill="url(#neonText)" filter="url(#glow)" opacity="0">
    SHOEB RAZA
    <animate attributeName="opacity" values="0;0;1" dur="1.6s" fill="freeze"/>
  </text>

  <text x="600" y="196" text-anchor="middle" font-family="'Fira Code',monospace" font-size="21" letter-spacing="3" fill="#B18FFF" opacity="0">
    FULL STACK WEB DEVELOPER · CSE @ LPU · DSA ENTHUSIAST
    <animate attributeName="opacity" values="0;0;1" dur="2.8s" fill="freeze"/>
  </text>

  <text x="600" y="270" text-anchor="middle" font-family="'Fira Code',monospace" font-size="15" letter-spacing="2" fill="#5eead4" opacity="0">
    Jalandhar, India &#8226; razashoeb840@gmail.com &#8226; CGPA 8.89/10.00
    <animate attributeName="opacity" values="0;0;0;1" dur="3.6s" fill="freeze"/>
  </text>
</svg>
